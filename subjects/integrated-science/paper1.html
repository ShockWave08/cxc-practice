<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrated Science Paper 1 – CXC Practice Hub</title>
  <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
  <nav>
    <a href="index.html">← Integrated Science</a> | <a href="../../index.html">Home</a>
    <span style="float:right; display:flex; gap:8px;">
      <button id="dark-toggle" style="font-size:0.85em; padding:5px 10px;">🌙</button>
    </span>
  </nav>
  <h1>🔬 Integrated Science – Paper 1 (Multiple Choice)</h1>

  <div id="setup">
    <label>Difficulty:
      <select id="difficulty">
        <option value="all">All</option>
        <option value="1">Easy</option>
        <option value="2">Medium</option>
        <option value="3">Hard</option>
      </select>
    </label>
    <label>Topic:
      <select id="unit">
        <option value="all">All Topics</option>
        <option value="Matter">Matter</option>
        <option value="Reproduction and Growth">Reproduction and Growth</option>
        <option value="Food and Nutrition">Food and Nutrition</option>
        <option value="Transport System">Transport System</option>
        <option value="Respiration and Air Pollution">Respiration and Air Pollution</option>
        <option value="Excretion">Excretion</option>
        <option value="Sense Organs">Sense Organs</option>
        <option value="Health">Health</option>
        <option value="Temperature Control and Ventilation">Temperature Control and Ventilation</option>
        <option value="Conservation of Energy">Conservation of Energy</option>
        <option value="Electricity">Electricity</option>
        <option value="Lighting">Lighting</option>
        <option value="Machines and Movement">Machines and Movement</option>
        <option value="Metals and Non-metals">Metals and Non-metals</option>
        <option value="Acids, Bases and Mixtures">Acids, Bases and Mixtures</option>
        <option value="The Universe and Our Solar System">The Universe and Our Solar System</option>
        <option value="The Terrestrial Environment">The Terrestrial Environment</option>
        <option value="Water and Aquatic Environment">Water and Aquatic Environment</option>
        <option value="Forces">Forces</option>
        <option value="Alternative Sources of Energy">Alternative Sources of Energy</option>
      </select>
    </label>
    <label><input type="checkbox" id="adaptiveMode"> Adaptive Mode (focus weak topics)</label>
    <label><input type="checkbox" id="spacedMode"> Spaced Repetition (prioritise unseen &amp; missed)</label>
    <label>Number of Questions:
      <input type="number" id="numQuestions" value="10" min="1" max="150">
    </label>
    <button onclick="startExam('Integrated Science')">Start Exam</button>
  </div>

  <div id="review-overlay"
       style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
              z-index:100; align-items:center; justify-content:center; padding:16px;">
    <div style="background:var(--bg,white); border-radius:12px; padding:24px;
                max-width:600px; width:100%; max-height:90vh; overflow-y:auto;
                box-shadow:0 8px 32px rgba(0,0,0,0.25);"></div>
  </div>

  <div id="timer"></div>
  <div id="question-container"></div>
  <button id="submit-btn" onclick="submitExam()" style="display:none;">Submit Exam</button>
  <div id="results"></div>

  <script src="../../js/storage.js"></script>
  <script src="../../js/adaptive.js"></script>
  <script src="../../js/question-loader.js"></script>
  <script src="../../js/exam-engine.js"></script>
  <script>
    applyDarkMode();
    loadQuestions("paper1-questions.json", "paper1");
    document.getElementById("dark-toggle").addEventListener("click", () => {
      const next = !getDarkMode(); setDarkMode(next); applyDarkMode();
      document.getElementById("dark-toggle").innerText = next ? "☀️" : "🌙";
    });
    document.getElementById("dark-toggle").innerText = getDarkMode() ? "☀️" : "🌙";
  </script>
</body>
</html>
